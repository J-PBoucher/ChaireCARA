    pinned: true
    #logo: img/logo_UQAM_ChaireCo-operators_renverse.png
    background: rgb(34, 57, 88)
    left:
      - text: "Accueil"        
        href: index.html
        
      - text: "À propos"        
        menu:
          - text: "Qui sommes-nous?"
            href: quisommesnous.html
          - text: "Comités"
            href: comites.html
          - text: "Nous joindre"
            href: NousJoindre.html

      - text: "Équipe"        
        menu:
          - text: "Membres et étudiant(e)s"        
            href: equipe.html   
          - text: "Étudiant(e)s diplômé(e)s"        
            href: anciens.html   

      - text: "Nouvelles"        
        href: nouvelles.html

      - text: "Publications"
        menu:
          - text: "Articles"
            href: publications.html
          - text: "Projets de recherche"
            href: projets.html
          - text: "Présentations"
            href: presentations.html
          - text: "Thèses et mémoires"
            href: ThesesMemoires.html
          - text: "Notes de cours"        
            href: books.html
            
      - text: "Intégrer la Chaire"        
