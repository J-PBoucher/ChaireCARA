  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">
        &#169; 2022–<script>document.write(new Date().getFullYear())</script>
        Jean-Philippe Boucher – Chaire CARA
      </span>
    right: |
      <span class="faux-block"><a href="https://github.com/J-PBoucher">View source on GitHub</a></span>

execute:
  freeze: false


format:
  html: 
    grid:
      sidebar-width: 300px
      body-width: 1500px
      margin-width: 300px
      gutter-width: 1.5rem
    fontsize: 1.1em
    theme: 
      light: sandstone
    css: custom.css  
    toc: true
    sidebar: true